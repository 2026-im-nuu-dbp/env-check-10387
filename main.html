<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人單頁作品</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 導覽列 -->
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">MyLogo</a>
            <ul class="nav-menu">
                <li><a href="#home">首頁</a></li>
                <li><a href="#about">關於我</a></li>
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#contact">聯絡方式</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主視覺區 -->
    <section id="home" class="hero">
        <div class="hero-content container">
            <h1>歡迎來到我的個人網站</h1>
            <p>我是一名熱愛前端設計與開發的工程師。</p>
            <a href="#portfolio" class="btn">我的行動宣言</a>
        </div>
    </section>

    <!-- 關於我 -->
    <section id="about" class="about">
        <div class="container about-content">
            <div class="about-photo">
                <img src="https://via.placeholder.com/300" alt="我的照片">
            </div>
            <div class="about-text">
                <h2>關於我</h2>
                <p>哈嘍。</p>
            </div>
        </div>
    </section>

    <!-- 作品集 -->
    <section id="portfolio" class="portfolio">
        <div class="container">
            <h2>作品集</h2>
            <div class="cards">
                <div class="card">
                    <img src="https://via.placeholder.com/400x200" alt="作品1">
                    <h3>練習作品 1</h3>
                    <p>簡短描述。</p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/400x200" alt="作品2">
                    <h3>練習作品 2</h3>
                    <p>簡短描述。</p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/400x200" alt="作品3">
                    <h3>練習作品 3</h3>
                    <p>簡短描述。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 聯絡方式 (可以在頁腳包含) -->
    <footer id="contact" class="footer">
        <div class="container">
            <p>&copy; 2026 版權所有</p>
            <div class="social">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
